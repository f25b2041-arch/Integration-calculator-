<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kamiran Ringkas</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; font-size: 18px; font-weight: bold; text-align: center; color: #495057; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Kamiran Ringkas</h2>
    <p style="font-size: 13px; color: #666; text-align: center;">Mengira luas di bawah lengkung untuk $f(x) = x^2 - 4x + 5$</p>
    
    <label for="lower">Sempadan Bawah (a):</label>
    <input type="number" id="lower" value="2">

    <label for="upper">Sempadan Atas (b):</label>
    <input type="number" id="upper" value="4">

    <button onclick="kiraKamiran()">Kira Luas</button>

    <div class="result" id="output">Klik butang untuk kira</div>
</div>

<script>
    function f_kamiran(x) {
        // Kamiran bagi x^2 - 4x + 5 adalah (x^3 / 3) - 2x^2 + 5x
        return (Math.pow(x, 3) / 3) - (2 * Math.pow(x, 2)) + (5 * x);
    }

    function kiraKamiran() {
        let a = parseFloat(document.getElementById('lower').value);
        let b = parseFloat(document.getElementById('upper').value);
        
        if (isNaN(a) || !isNaN(b) === false) {
            document.getElementById('output').innerText = "Sila masukkan nombor yang sah.";
            return;
        }

        let luas = f_kamiran(b) - f_kamiran(a);
        document.getElementById('output').innerText = "Luas = " + luas.toFixed(2) + " unit²";
    }
</script>

</body>
</html>
